services:
  - type: web
    name: anata-ops-ap-inbox
    runtime: python
    repo: https://github.com/david-anata/anata-ops.git
    branch: main
    plan: starter
    region: oregon
    buildCommand: python3 -m py_compile ap_upload_inbox.py ap_audit.py
    startCommand: python3 ap_upload_inbox.py
    healthCheckPath: /health
    envVars:
      - key: AP_UPLOAD_TOKEN
        sync: false
      - key: AP_ADMIN_USERNAME
        sync: false
      - key: AP_ADMIN_PASSWORD
        sync: false
      - key: AP_SESSION_SECRET
        sync: false
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: CLICKUP_LIST_ID
        value: "901104880724"
      - key: CLICKUP_VIEW_ID
        sync: false
      - key: AP_UPLOAD_STORAGE_DIR
        value: /var/data/ap_upload_inbox
      - key: AP_UPLOAD_MAX_BYTES
        value: "10485760"
    disk:
      name: ap-upload-disk
      mountPath: /var/data
      sizeGB: 5
  - type: cron
    name: anata-ops-ap-daily
    runtime: python
    repo: https://github.com/david-anata/anata-ops.git
    branch: main
    plan: starter
    region: oregon
    buildCommand: python3 -m py_compile ap_audit.py scripts/run_scheduled_audit.py
    startCommand: python3 scripts/run_scheduled_audit.py --mode daily
    schedule: "0 * * * 1-5"
    envVars:
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: CLICKUP_LIST_ID
        sync: false
      - key: CLICKUP_VIEW_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: AP_TRANSACTIONS_AUTH_TOKEN
        sync: false
      - key: AP_TRANSACTIONS_URL
        value: https://anata-ops-ap-inbox.onrender.com/latest.csv
      - key: AP_LOOKBACK_DAYS
        value: "7"
      - key: AP_APPLY_CLICKUP_UPDATES
        value: "false"
      - key: AP_POST_SLACK
        value: "false"
      - key: AP_DATA_DIR
        value: "data"
  - type: cron
    name: anata-ops-ap-weekly
    runtime: python
    repo: https://github.com/david-anata/anata-ops.git
    branch: main
    plan: starter
    region: oregon
    buildCommand: python3 -m py_compile ap_audit.py scripts/run_scheduled_audit.py
    startCommand: python3 scripts/run_scheduled_audit.py --mode weekly
    schedule: "30 * * * 1"
    envVars:
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: CLICKUP_LIST_ID
        sync: false
      - key: CLICKUP_VIEW_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: AP_TRANSACTIONS_AUTH_TOKEN
        sync: false
      - key: AP_TRANSACTIONS_URL
        value: https://anata-ops-ap-inbox.onrender.com/latest.csv
      - key: AP_LOOKBACK_DAYS
        value: "7"
      - key: AP_APPLY_CLICKUP_UPDATES
        value: "false"
      - key: AP_POST_SLACK
        value: "false"
      - key: AP_DATA_DIR
        value: "data"
